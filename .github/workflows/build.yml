name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: ollama-mcp
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: ollama-mcp.exe
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: ollama-mcp

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.binary }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollama-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.binary }}
